<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Community Event Check-In</title>
  <style>
    :root{font-family:Inter,system-ui,Arial,sans-serif;color:#172033;background:#f4f7fb}
    *{box-sizing:border-box}body{margin:0}.wrap{max-width:1100px;margin:auto;padding:24px}.top{display:flex;gap:16px;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;margin-bottom:20px}.top h1{margin:0 0 6px;font-size:30px}.muted{color:#687386}.panel,.card{background:#fff;border:1px solid #dde4ee;border-radius:16px;box-shadow:0 8px 24px rgba(21,31,50,.06)}.stats{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:14px;margin-bottom:18px}.card{padding:18px}.card span{display:block;color:#687386;font-size:13px}.card strong{display:block;font-size:30px;margin-top:7px}.panel{padding:18px}.toolbar{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:16px}.toolbar input{flex:1;min-width:220px}.toolbar input,.toolbar button{border:1px solid #cfd8e5;border-radius:10px;padding:11px 13px;font:inherit}.toolbar button{cursor:pointer;background:#fff;font-weight:700}.toolbar .primary{background:#1769e0;color:#fff;border-color:#1769e0}.table-wrap{overflow:auto}table{width:100%;border-collapse:collapse}th,td{padding:13px 10px;border-bottom:1px solid #e6ebf2;text-align:left}th{font-size:12px;color:#687386;text-transform:uppercase;letter-spacing:.04em}.status{display:inline-block;padding:6px 9px;border-radius:999px;font-size:12px;font-weight:800}.yes{background:#dcfce7;color:#166534}.no{background:#f1f5f9;color:#475569}.action{border:0;border-radius:9px;padding:8px 11px;font-weight:800;cursor:pointer}.mark{background:#1769e0;color:#fff}.undo{background:#e2e8f0;color:#334155}.empty{text-align:center;color:#687386;padding:28px}.footer-note{margin-top:12px;color:#687386;font-size:13px}@media(max-width:760px){.stats{grid-template-columns:repeat(2,minmax(0,1fr))}.wrap{padding:14px}th:nth-child(2),td:nth-child(2){display:none}}@media print{.toolbar,.action,.footer-note{display:none}.wrap{max-width:none}.panel,.card{box-shadow:none}}
  </style>
</head>
<body>
  <main class="wrap">
    <header class="top">
      <div><h1>Community Event Check-In</h1><div class="muted">Simple attendee attendance tracking stored on this device.</div></div>
      <button id="printBtn" class="action undo" type="button">Print</button>
    </header>

    <section class="stats" aria-label="Attendance dashboard">
      <article class="card"><span>Total Attendees</span><strong id="totalCount">0</strong></article>
      <article class="card"><span>Attended</span><strong id="attendedCount">0</strong></article>
      <article class="card"><span>Not Attended</span><strong id="notAttendedCount">0</strong></article>
      <article class="card"><span>Remaining</span><strong id="remainingCount">0</strong></article>
    </section>

    <section class="panel">
      <div class="toolbar">
        <input id="nameInput" type="text" placeholder="Add attendee name" autocomplete="off">
        <button id="addBtn" class="primary" type="button">Add Attendee</button>
        <input id="searchInput" type="search" placeholder="Search attendees">
        <button id="clearBtn" type="button">Clear All</button>
      </div>
      <div class="table-wrap">
        <table>
          <thead><tr><th>Name</th><th>Added</th><th>Status</th><th>Action</th></tr></thead>
          <tbody id="attendeeBody"></tbody>
        </table>
      </div>
      <div class="footer-note">Attendance updates are saved automatically in your browser using local storage.</div>
    </section>
  </main>

  <script>
    (()=>{
      'use strict';
      const KEY='community_event_attendees_v1';
      const state={attendees:load(),search:''};
      const $=id=>document.getElementById(id);
      function load(){try{return JSON.parse(localStorage.getItem(KEY)||'[]')}catch{return[]}}
      function save(){localStorage.setItem(KEY,JSON.stringify(state.attendees))}
      function escapeHtml(v){return String(v??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}
      function render(){
        const total=state.attendees.length;
        const attended=state.attendees.filter(a=>a.attended).length;
        $('totalCount').textContent=total;
        $('attendedCount').textContent=attended;
        $('notAttendedCount').textContent=total-attended;
        $('remainingCount').textContent=total-attended;
        const q=state.search.trim().toLowerCase();
        const rows=state.attendees.filter(a=>!q||a.name.toLowerCase().includes(q));
        $('attendeeBody').innerHTML=rows.length?rows.map(a=>`<tr><td><strong>${escapeHtml(a.name)}</strong></td><td>${new Date(a.createdAt).toLocaleString('en-GB')}</td><td><span class="status ${a.attended?'yes':'no'}">${a.attended?'Attended':'Not Attended'}</span></td><td><button class="action ${a.attended?'undo':'mark'}" data-id="${a.id}">${a.attended?'Undo':'Mark Attended'}</button></td></tr>`).join(''):'<tr><td colspan="4" class="empty">No attendees found.</td></tr>';
      }
      function add(){
        const name=$('nameInput').value.trim();
        if(!name)return $('nameInput').focus();
        state.attendees.unshift({id:crypto.randomUUID?crypto.randomUUID():String(Date.now()),name,attended:false,createdAt:new Date().toISOString(),attendedAt:null});
        $('nameInput').value='';save();render();$('nameInput').focus();
      }
      $('addBtn').addEventListener('click',add);
      $('nameInput').addEventListener('keydown',e=>{if(e.key==='Enter')add()});
      $('searchInput').addEventListener('input',e=>{state.search=e.target.value;render()});
      $('attendeeBody').addEventListener('click',e=>{const b=e.target.closest('[data-id]');if(!b)return;const a=state.attendees.find(x=>x.id===b.dataset.id);if(!a)return;a.attended=!a.attended;a.attendedAt=a.attended?new Date().toISOString():null;save();render()});
      $('clearBtn').addEventListener('click',()=>{if(!state.attendees.length)return;if(confirm('Remove all attendees and attendance records?')){state.attendees=[];save();render()}});
      $('printBtn').addEventListener('click',()=>window.print());
      render();
    })();
  </script>
</body>
</html>
