<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>2026 Campaign Manager</title>
  <style>
    *{box-sizing:border-box}body{margin:0;min-height:100vh;display:grid;place-items:center;background:linear-gradient(135deg,#eef4ff,#eef8f6);font-family:Inter,system-ui,-apple-system,Segoe UI,Arial,sans-serif;color:#142238;padding:24px}.card{width:min(760px,100%);background:#fff;border:1px solid #dfe7f0;border-radius:28px;padding:36px;box-shadow:0 22px 55px rgba(20,34,56,.12)}.mark{display:inline-grid;place-items:center;width:60px;height:60px;border-radius:18px;background:linear-gradient(135deg,#4f7df3,#138a7e);color:#fff;font-weight:900}.eyebrow{margin:24px 0 8px;color:#4f7df3;text-transform:uppercase;font-size:12px;font-weight:900;letter-spacing:.13em}h1{margin:0;font-size:clamp(38px,7vw,66px);line-height:1}p{color:#687a90;font-size:18px;line-height:1.55}.actions{display:flex;gap:12px;flex-wrap:wrap;margin-top:24px}a{display:inline-block;padding:12px 18px;border-radius:12px;text-decoration:none;font-weight:800}.admin{background:#172a43;color:#fff}.public{background:#edf2f7;color:#34465d}
  </style>
</head>
<body>
  <main class="card">
    <span class="mark">2026</span>
    <p class="eyebrow">Campaign Management System</p>
    <h1>One resident master. Multiple campaign views.</h1>
    <p>The administration workspace is separated from future public and password-protected pages.</p>
    <div class="actions">
      <a class="admin" href="admin/">Open Admin Workspace</a>
      <a class="public" href="public.html">Public Page Placeholder</a>
    </div>
  </main>
</body>
</html>
