<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>2026 Campaign Manager</title>
  <style>
    *{box-sizing:border-box}body{margin:0;font-family:Inter,system-ui,sans-serif;background:#f2f6fb;color:#102038}.hero{min-height:100vh;display:grid;place-items:center;padding:24px;background:linear-gradient(145deg,#102038,#1d3554)}.card{width:min(920px,100%);background:#fff;border-radius:28px;padding:42px;box-shadow:0 30px 80px rgba(0,0,0,.22)}.eyebrow{color:#4f7df3;font-weight:800;text-transform:uppercase;letter-spacing:.12em;font-size:12px}.card h1{font-size:clamp(34px,7vw,68px);margin:10px 0 14px}.card p{color:#687d98;font-size:18px;line-height:1.6}.links{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-top:30px}.link{display:block;padding:22px;border:1px solid #e3eaf3;border-radius:18px;text-decoration:none;color:#102038;background:#f9fbfe}.link strong{display:block;font-size:18px}.link span{display:block;color:#71849b;margin-top:7px}.link.admin{background:#4f7df3;color:#fff;border-color:#4f7df3}.link.admin span{color:#dfe8ff}@media(max-width:700px){.card{padding:26px}.links{grid-template-columns:1fr}}

</head>
<body>
  <main class="hero">
    <section class="card">
      <p class="eyebrow">2026 Campaign Manager</p>
      <h1>Campaign Workspace</h1>
      <p>The visual website and the secure master admin workspace are separated. Both use the same Supabase Residents master data.</p>
      <div class="links">
        <a class="link" href="public.html"><strong>Public Residents</strong><span>Read-only resident gallery</span></a>
        <a class="link" href="shared.html"><strong>Shared Workspace</strong><span>Limited volunteer access</span></a>
        <a class="link admin" href="admin/"><strong>Admin Master</strong><span>Secure editing and workflows</span></a>
      </div>
    </section>
  </main>

</html>
