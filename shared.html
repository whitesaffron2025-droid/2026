<!doctype html>
<html lang="en">
<head>

  <style>
    *{box-sizing:border-box}body{margin:0;font-family:Inter,system-ui,sans-serif;background:#eef3f8;color:#132238}.shell{min-height:100vh;display:grid;place-items:center;padding:24px}.panel{width:min(680px,100%);background:#fff;border:1px solid #e2eaf3;border-radius:24px;padding:34px;box-shadow:0 18px 55px rgba(19,34,56,.1)}.badge{display:inline-block;padding:7px 11px;border-radius:99px;background:#fff3cd;color:#856404;font-size:12px;font-weight:800}.panel h1{margin:16px 0 10px}.panel p{color:#6d8098;line-height:1.6}.actions{display:flex;gap:12px;flex-wrap:wrap;margin-top:24px}.btn{padding:12px 17px;border-radius:12px;text-decoration:none;font-weight:800}.primary{background:#4f7df3;color:#fff}.secondary{background:#edf2f7;color:#243850}
  </style>
</head>
<body>
  <main class="shell">
    <section class="panel">
      <span class="badge">Limited Access</span>
      <h1>Shared Workspace</h1>
      <p>This page is separate from the Admin Master workspace. Volunteer access and password/token protection will be enabled here without exposing full resident records or admin controls.</p>
      <div class="actions"><a class="btn primary" href="public.html">Open Public Residents</a><a class="btn secondary" href="index.html">Back Home</a></div>
    </section>
